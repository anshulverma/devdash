name: Release

# Real publish runs ONLY on a pushed version tag (vX.Y.Z). The manual trigger
# defaults to a dry run (build + verify, no publish). No tag is pushed by CI,
# so this workflow never fires on its own.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build artifacts but do not publish"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      dry_run: ${{ steps.v.outputs.dry_run }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

  python:
    needs: meta
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm, cache-dependency-path: pnpm-lock.yaml }
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "3.12" }
      - name: Stamp version + bundle the standalone UI into the wheel
        run: |
          scripts/set-version.sh "${{ needs.meta.outputs.version }}"
          scripts/build-standalone-ui.sh
      - name: Build wheel + sdist
        working-directory: packages/api
        run: uv build
      - uses: actions/upload-artifact@v4
        with: { name: python-dist, path: packages/api/dist/* }
      - name: Publish to PyPI (Trusted Publishing)
        if: needs.meta.outputs.dry_run == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/api/dist
          skip-existing: true   # idempotent / re-runnable

  npm:
    needs: meta
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Stamp version + build the UI package
        run: |
          scripts/set-version.sh "${{ needs.meta.outputs.version }}"
          pnpm -C packages/ui build
      - uses: actions/upload-artifact@v4
        with: { name: npm-pack, path: packages/ui }
      - name: Publish to npm (provenance)
        if: needs.meta.outputs.dry_run == 'false'
        working-directory: packages/ui
        run: npm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      packages: write   # GHCR
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: needs.meta.outputs.dry_run == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.meta.outputs.dry_run == 'false' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
