name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm -C examples/host-app exec tsc --noEmit
      - run: pnpm -C examples/host-app build

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: devdash
          POSTGRES_PASSWORD: devdash
          POSTGRES_DB: devdash
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: packages/api
    env:
      DEVDASH_TEST_PG_URL: postgresql+asyncpg://devdash:devdash@localhost:5432/devdash
      DEVDASH_TEST_REDIS_URL: redis://localhost:6379
      DEVDASH_TEST_QUICKWIT_URL: http://localhost:7280
    steps:
      - uses: actions/checkout@v4
      - name: Start Quickwit
        working-directory: .
        run: |
          docker run -d --name quickwit -p 7280:7280 quickwit/quickwit:latest run
          for i in $(seq 1 60); do
            curl -fsS http://localhost:7280/health/livez >/dev/null 2>&1 && { echo "quickwit ready"; break; }
            sleep 2
          done
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --extra quickwit-redis
      - run: uv run pytest -q
      - run: uv run ruff check .

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ""
