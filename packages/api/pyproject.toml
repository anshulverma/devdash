[project]
name = "devdash"
version = "0.0.0"
description = "Pluggable operator/developer dashboard — backend (mountable FastAPI sub-app + standalone runner)."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [{ name = "Anshul Verma" }]
dependencies = [
    "fastapi",
    "sqlalchemy[asyncio]",
    "alembic",
    "pydantic-settings",
    "uvicorn",
    "asyncpg>=0.31.0",
    "prometheus-fastapi-instrumentator>=8.0.0",
    "aiosqlite",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "httpx",
    "ruff",
    "anyio",
    "aiosqlite>=0.22.1",
    "greenlet>=3.5.1",
    "redis>=8.0.0",
]
quickwit-redis = [
    "httpx>=0.28.1",
    "redis>=8.0.0",
]

[project.scripts]
devdash = "devdash.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/devdash"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Header", "fastapi.Query"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
